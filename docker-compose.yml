services:
  db:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: identityforge-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: identityforge
      MYSQL_USER: identityforge
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-idforge_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "identityforge", "-p${MYSQL_PASSWORD:-idforge_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - idforge-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: identityforge-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/identityforge?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: identityforge
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-idforge_pass}
      APP_JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string-at-least-256-bits}
      APP_AVATAR_STORAGE_PATH: /app/public/avatars
      APP_EXPORT_PATH: /app/public/exports
    volumes:
      - aes_key:/app/config
      - avatars:/app/public/avatars
      - exports:/app/public/exports
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - idforge-net

volumes:
  db_data:
  aes_key:
  avatars:
  exports:
  logs:

networks:
  idforge-net:
    driver: bridge
