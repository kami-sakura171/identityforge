server.port=8080

# MySQL Datasource
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/identityforge?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:identityforge}
spring.datasource.password=${DB_PASSWORD:idforge_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Multipart file upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
app.jwt.secret=${JWT_SECRET:default-jwt-secret-change-in-production-minimum-256-bits-length}
app.jwt.expiration-minutes=60
app.jwt.refresh-expiration-days=7

# Session Configuration
app.session.default-timeout-minutes=30
app.session.max-concurrent-devices=3

# Security
app.security.lockout.max-attempts=5
app.security.lockout.duration-minutes=15
app.security.alert.threshold=10
app.security.alert.window-minutes=5

# Avatar storage
app.avatar.storage-path=${AVATAR_STORAGE_PATH:public/avatars}
app.avatar.max-size=2097152
app.avatar.allowed-types=image/jpeg,image/png

# Export storage
app.export.storage-path=${EXPORT_PATH:public/exports}

# Encryption
app.encryption.key-file=config/aes-key.txt

# Logging
logging.config=classpath:logback-spring.xml
logging.level.com.identityforge=INFO
logging.level.org.springframework.security=WARN
