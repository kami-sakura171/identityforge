<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>用户管理</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
    <h1 layout:fragment="page-title">用户管理</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="search-box" style="margin-bottom:16px;">
                <input type="text" id="searchInput" class="form-control" placeholder="搜索用户名或显示名称..."
                       onkeyup="if(event.key==='Enter') searchCustomers()">
            </div>
            <button class="btn btn-primary" onclick="searchCustomers()">搜索</button>
        </div>
        <div class="card">
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>用户名</th><th>显示名称</th><th>状态</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead>
                    <tbody id="customerTableBody"><tr><td colspan="7" style="text-align:center;">加载中...</td></tr></tbody>
                </table>
            </div>
            <div id="pagination" style="margin-top:16px;display:flex;gap:8px;justify-content:center;"></div>
        </div>
    </div>
    <th:block layout:fragment="scripts-extra">
        <script>
            let currentPage = 0;
            document.addEventListener('DOMContentLoaded', () => searchCustomers());
            async function searchCustomers() {
                const q = document.getElementById('searchInput').value;
                try { const res = await api.get(`/api/admin/customers?q=${encodeURIComponent(q)}&page=${currentPage}&size=15`); renderTable(res.data); }
                catch(e) { Toast.error('加载用户列表失败'); }
            }
            function renderTable(data) {
                const tbody = document.getElementById('customerTableBody');
                if (!data.content?.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">未找到用户</td></tr>'; return; }
                tbody.innerHTML = data.content.map(c => `<tr>
                    <td>${c.id}</td><td>${escapeHtml(c.username)}</td><td>${escapeHtml(c.displayName||'-')}</td>
                    <td><span class="badge ${c.accountStatus==='ACTIVE'?'badge-active':'badge-locked'}">${c.accountStatus==='ACTIVE'?'正常':'锁定'}</span></td>
                    <td>${c.contextualRole}</td><td>${c.createdAt?new Date(c.createdAt).toLocaleDateString():'-'}</td>
                    <td>${c.accountStatus==='LOCKED'?`<button class="btn btn-sm btn-primary" onclick="unlockCustomer(${c.id})">解锁</button>`:`<button class="btn btn-sm btn-secondary" onclick="lockCustomer(${c.id})">锁定</button>`}<button class="btn btn-sm btn-secondary" onclick="forceReset(${c.id})">重置密码</button></td>
                </tr>`).join('');
                const pag = document.getElementById('pagination'); pag.innerHTML = '';
                for (let i = 0; i < data.totalPages; i++) { const btn = document.createElement('button'); btn.className = `btn btn-sm ${i===currentPage?'btn-primary':'btn-secondary'}`; btn.textContent = i+1; btn.onclick = () => { currentPage = i; searchCustomers(); }; pag.appendChild(btn); }
            }
            async function lockCustomer(id) { try { await api.put(`/api/admin/customers/${id}/lock`); Toast.success('账户已锁定'); searchCustomers(); } catch(e) { Toast.error(e.message); } }
            async function unlockCustomer(id) { try { await api.put(`/api/admin/customers/${id}/unlock`); Toast.success('账户已解锁'); searchCustomers(); } catch(e) { Toast.error(e.message); } }
            async function forceReset(id) { try { await api.post(`/api/admin/customers/${id}/force-password-reset`, {}); Toast.success('已强制密码重置'); } catch(e) { Toast.error(e.message); } }
        </script>
    </th:block>
</body>
</html>
