<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>批量导入</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
    <h1 layout:fragment="page-title">批量导入用户</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">上传 CSV 文件</div>
            <p style="color:var(--text-secondary);margin-bottom:12px;">
                必填列：username、password、first_name、last_name、display_name、date_of_birth (MM/DD/YYYY)、security_question_id (1-8)、security_answer。最多 1,000 行。
            </p>
            <input type="file" id="csvFile" accept=".csv" class="form-control" style="margin-bottom:12px;">
            <button id="importBtn" class="btn btn-primary" onclick="doImport()">开始导入</button>
        </div>
        <div id="importResult" class="import-result" style="display:none;"></div>
    </div>
    <th:block layout:fragment="scripts-extra">
        <script>
            async function doImport() {
                const fileInput = document.getElementById('csvFile');
                if (!fileInput.files[0]) { Toast.error('请选择 CSV 文件'); return; }
                const btn = document.getElementById('importBtn'); setButtonLoading(btn, true);
                const formData = new FormData(); formData.append('file', fileInput.files[0]);
                try {
                    const result = await api.upload('/api/admin/import/csv', formData);
                    const d = result.data;
                    document.getElementById('importResult').style.display = 'block';
                    document.getElementById('importResult').innerHTML = `<div class="card"><div class="card-header">导入结果</div><div class="summary"><div class="result-card"><div class="number">${d.totalRows}</div><div>总行数</div></div><div class="result-card success"><div class="number">${d.successCount}</div><div>成功</div></div><div class="result-card failure"><div class="number">${d.failureCount}</div><div>失败</div></div></div>${d.failures?.length?`<div class="card-header">失败明细</div><div class="failure-table"><table><thead><tr><th>行号</th><th>原因</th></tr></thead><tbody>${d.failures.map(f=>`<tr><td>${f.row}</td><td>${f.reason}</td></tr>`).join('')}</tbody></table></div>`:''}</div>`;
                    Toast.success(`成功导入 ${d.successCount} 个用户`);
                } catch(e) { Toast.error(e.message || '导入失败'); }
                finally { setButtonLoading(btn, false); }
            }
        </script>
    </th:block>
</body>
</html>
