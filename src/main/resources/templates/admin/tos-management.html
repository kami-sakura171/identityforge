<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>服务条款管理</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
    <h1 layout:fragment="page-title">服务条款管理</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">发布新版本</div>
            <form id="tosForm" onsubmit="publishToS(event)">
                <div class="form-group"><label>版本号</label><input type="text" id="tosVersion" class="form-control" required placeholder="例如：2.0"></div>
                <div class="form-group"><label>标题</label><input type="text" id="tosTitle" class="form-control" required></div>
                <div class="form-group"><label>内容</label><textarea id="tosContent" class="form-control" rows="8" required></textarea></div>
                <button type="submit" id="publishBtn" class="btn btn-primary">发布版本</button>
            </form>
        </div>
        <div class="card"><div class="card-header">历史版本</div><div id="versionsList">加载中...</div></div>
    </div>
    <th:block layout:fragment="scripts-extra">
        <script>
            document.addEventListener('DOMContentLoaded', loadVersions);
            async function loadVersions() {
                try {
                    const res = await api.get('/api/admin/tos');
                    const versions = res.data || [];
                    document.getElementById('versionsList').innerHTML = versions.map(v => `<div class="custom-field-row"><div class="field-info"><strong>v${escapeHtml(v.version)}</strong> — ${escapeHtml(v.title)} <span class="badge ${v.isActive?'badge-active':''}">${v.isActive?'生效中':'已停用'}</span></div><small>${new Date(v.publishedAt).toLocaleDateString()}</small></div>`).join('');
                } catch(e) { Toast.error('加载版本列表失败'); }
            }
            async function publishToS(event) {
                event.preventDefault(); const btn = document.getElementById('publishBtn'); setButtonLoading(btn, true);
                try { await api.post('/api/admin/tos', { version: document.getElementById('tosVersion').value, title: document.getElementById('tosTitle').value, content: document.getElementById('tosContent').value }); Toast.success('版本已发布'); loadVersions(); document.getElementById('tosForm').reset(); }
                catch(e) { Toast.error(e.message); } finally { setButtonLoading(btn, false); }
            }
        </script>
    </th:block>
</body>
</html>
