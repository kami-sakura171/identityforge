<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <title>身份锻造 | CIAM 平台</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block layout:fragment="styles"></th:block>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></aside>

        <main class="main-content">
            <header class="top-header">
                <h1 layout:fragment="page-title">工作台</h1>
                <div class="header-actions">
                    <div th:replace="~{fragments/notification-tray :: bell}"></div>
                    <span class="user-info" sec:authentication="name"></span>
                    <span sec:authorize="hasRole('ADMIN')" class="badge badge-active">管理员</span>
                    <a href="#" onclick="logout()" class="btn btn-sm btn-danger" style="margin-left:8px;">退出登录</a>
                </div>
            </header>

            <div layout:fragment="content">
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/notification-tray :: tray}"></div>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
    <th:block layout:fragment="scripts-extra"></th:block>
</body>
</html>
