<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>实名认证</title></head>
<body>
    <h1 layout:fragment="page-title">实名认证</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">提交认证信息</div>
            <form id="verifForm" onsubmit="submitVerification(event)">
                <div class="form-group">
                    <label for="docType">证件类型</label>
                    <select id="docType" name="documentType" class="form-control" required>
                        <option value="">请选择...</option>
                        <option value="PASSPORT">护照</option>
                        <option value="DRIVERS_LICENSE">驾驶证</option>
                        <option value="NATIONAL_ID">身份证</option>
                        <option value="RESIDENCE_PERMIT">居住证</option>
                        <option value="OTHER">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="docNumber">证件号码</label>
                    <input type="text" id="docNumber" name="documentNumber" class="form-control" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="realName">真实姓名（与证件一致）</label>
                    <input type="text" id="realName" name="realName" class="form-control" maxlength="100">
                </div>
                <button type="submit" id="submitVerifBtn" class="btn btn-primary">提交审核</button>
            </form>
        </div>
        <div id="verifStatus" class="card" style="margin-top:16px;">
            <div class="card-header">认证状态</div>
            <p id="statusText">加载中...</p>
        </div>
    </div>
    <th:block layout:fragment="scripts-extra">
        <script>
            document.addEventListener('DOMContentLoaded', loadVerification);
            async function loadVerification() {
                try {
                    const res = await api.get('/api/customer/verification');
                    document.getElementById('statusText').textContent = res.data ? '状态：' + res.data.status : '尚未提交认证信息。';
                } catch(e) {}
            }
            async function submitVerification(event) {
                event.preventDefault();
                const btn = document.getElementById('submitVerifBtn'); setButtonLoading(btn, true);
                try {
                    await api.post('/api/customer/verification', { documentType: document.getElementById('docType').value, documentNumber: document.getElementById('docNumber').value, realName: document.getElementById('realName').value });
                    Toast.success('认证信息已提交'); loadVerification(); document.getElementById('verifForm').reset();
                } catch(e) { Toast.error(e.message || '提交失败'); }
                finally { setButtonLoading(btn, false); }
            }
        </script>
    </th:block>
</body>
</html>
