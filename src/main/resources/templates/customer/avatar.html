<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>头像管理</title></head>
<body>
    <h1 layout:fragment="page-title">头像管理</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">上传头像</div>
            <div class="avatar-upload">
                <img id="avatarPreview" class="avatar-preview" th:src="@{/img/default-avatar.svg}" alt="头像预览">
                <div>
                    <div id="avatarDropzone" class="avatar-dropzone">
                        <p>📁 拖拽图片到此处或点击上传</p>
                        <small style="color:var(--text-secondary);">支持 JPEG/PNG，最大 2MB</small>
                    </div>
                    <input type="file" id="avatarFileInput" accept="image/jpeg,image/png" style="display:none;">
                    <button id="uploadAvatarBtn" class="btn btn-primary" style="margin-top:8px;">上传头像</button>
                </div>
            </div>
        </div>
    </div>
    <th:block layout:fragment="scripts-extra"><script th:src="@{/js/avatar-upload.js}"></script></th:block>
</body>
</html>
