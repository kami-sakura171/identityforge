<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>服务条款</title></head>
<body>
    <h1 layout:fragment="page-title">服务条款</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">当前服务条款</div>
            <div id="tosContent" style="padding:16px;">加载中...</div>
            <div id="tosActions" style="padding:0 16px 16px 16px;display:none;">
                <button id="acceptTosBtn" class="btn btn-primary" onclick="acceptTos()">同意条款</button>
            </div>
        </div>
    </div>
    <th:block layout:fragment="scripts-extra">
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const statusRes = await api.get('/api/customer/consents/status');
                    const status = statusRes.data;
                    document.getElementById('tosContent').innerHTML = `<h3>当前版本：${status.currentVersion || '无'}</h3><p>已同意：${status.accepted ? '✅ 是' : '❌ 否'}</p>${status.accepted ? '' : '<p style="color:var(--danger);">您必须同意服务条款才能继续使用本平台。</p>'}`;
                    if (!status.accepted) document.getElementById('tosActions').style.display = 'block';
                } catch(e) { Toast.error('加载条款失败'); }
            });
            async function acceptTos() {
                try { await api.post('/api/customer/consents'); Toast.success('已同意服务条款'); location.reload(); }
                catch(e) { Toast.error('操作失败'); }
            }
        </script>
    </th:block>
</body>
</html>
