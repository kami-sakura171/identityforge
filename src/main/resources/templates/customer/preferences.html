<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>通知偏好</title></head>
<body>
    <h1 layout:fragment="page-title">通知偏好</h1>
    <div layout:fragment="content">
        <div class="card">
            <div class="card-header">消息通知开关</div>
            <div id="prefsContainer" class="toggle-group"></div>
        </div>
        <button class="btn btn-primary" onclick="savePreferences()">保存偏好</button>
    </div>
    <th:block layout:fragment="scripts-extra">
        <script>
            document.addEventListener('DOMContentLoaded', loadPrefs);
            async function loadPrefs() {
                try {
                    const res = await api.get('/api/customer/preferences');
                    const prefs = res.data || {};
                    const container = document.getElementById('prefsContainer');
                    container.innerHTML = Object.entries(prefs).map(([key, val]) => `<div class="toggle-item"><span>${key}</span><label class="toggle-switch"><input type="checkbox" data-category="${key}" ${val?'checked':''}><span class="toggle-slider"></span></label></div>`).join('');
                } catch(e) { Toast.error('加载偏好失败'); }
            }
            async function savePreferences() {
                const prefs = {};
                document.querySelectorAll('[data-category]').forEach(el => prefs[el.dataset.category] = el.checked);
                try { await api.put('/api/customer/preferences', prefs); Toast.success('偏好已保存'); }
                catch(e) { Toast.error('保存失败'); }
            }
        </script>
    </th:block>
</body>
</html>
