<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>登录</title></head>
<body>
    <div layout:fragment="content" class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">🔐 身份锻造</div>
            <h2>欢迎回来</h2>
            <p class="auth-subtitle">登录您的账户</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" class="form-control" required
                           placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" class="form-control" required
                           placeholder="请输入密码" autocomplete="current-password">
                </div>
                <div id="loginError" class="form-error" style="margin-bottom:12px;display:none;"></div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-lg" style="width:100%;">
                    登 录
                </button>
            </form>

            <p style="text-align:center;margin-top:16px;color:var(--text-secondary);">
                还没有账户？<a th:href="@{/register}">立即注册</a>
            </p>

            <div style="margin-top:20px;padding:16px;background:#e8f0fe;border-radius:8px;font-size:0.85rem;color:var(--text-secondary);">
                <strong>演示账户：</strong><br>
                管理员：<code>admin</code> / <code>Admin@12345</code>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts-extra">
        <script>
            document.body.classList.add('auth-body');
            async function handleLogin(event) {
                event.preventDefault();
                const btn = document.getElementById('loginBtn');
                const errorEl = document.getElementById('loginError');
                setButtonLoading(btn, true);
                errorEl.style.display = 'none';
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message || '登录失败');
                    setTokens(data.data.accessToken, data.data.refreshToken);
                    window.location.href = data.data.isAdmin ? '/admin/dashboard' : '/customer/dashboard';
                } catch (e) {
                    errorEl.textContent = e.message;
                    errorEl.style.display = 'block';
                } finally {
                    setButtonLoading(btn, false);
                }
            }
        </script>
        <style>.sidebar,.top-header{display:none;}.main-content{padding:0;flex:1;}.app-layout{display:block;}body{background:transparent;}</style>
    </th:block>
</body>
</html>
