<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base-layout}">
<head><title>注册</title></head>
<body>
    <div layout:fragment="content" class="auth-page">
        <div class="auth-card" style="max-width:520px;">
            <div class="auth-logo">🔐 身份锻造</div>
            <h2>创建账户</h2>
            <p class="auth-subtitle">注册新的客户账户</p>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" name="username" class="form-control" required
                           minlength="4" placeholder="至少4个字符">
                </div>
                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" name="password" class="form-control" required
                           minlength="10" placeholder="至少10位，含大写字母、数字、特殊符号各一个">
                    <div style="font-size:0.75rem;color:var(--text-secondary);margin-top:4px;">
                        要求：≥10个字符，包含1个大写字母、1个数字、1个特殊符号
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label for="firstName">名 *</label>
                        <input type="text" id="firstName" name="firstName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">姓 *</label>
                        <input type="text" id="lastName" name="lastName" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="displayName">显示名称</label>
                    <input type="text" id="displayName" name="displayName" class="form-control">
                </div>
                <div class="form-group">
                    <label for="dateOfBirth">出生日期 * (月/日/年)</label>
                    <input type="text" id="dateOfBirth" name="dateOfBirth" class="form-control" required
                           placeholder="MM/DD/YYYY" pattern="^(0[1-9]|1[0-2])/(0[1-9]|[12][0-9]|3[01])/\d{4}$">
                </div>
                <div class="form-group">
                    <label for="securityQuestionId">安全问题 *</label>
                    <select id="securityQuestionId" name="securityQuestionId" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label for="securityAnswer">安全答案 *</label>
                    <input type="text" id="securityAnswer" name="securityAnswer" class="form-control" required>
                </div>
                <div id="registerError" class="form-error" style="margin-bottom:12px;display:none;"></div>
                <button type="submit" id="registerBtn" class="btn btn-primary btn-lg" style="width:100%;">
                    创建账户
                </button>
            </form>

            <p style="text-align:center;margin-top:16px;color:var(--text-secondary);">
                已有账户？<a th:href="@{/login}">立即登录</a>
            </p>
        </div>
    </div>

    <th:block layout:fragment="scripts-extra">
        <script>
            document.body.classList.add('auth-body');
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const res = await fetch('/api/security-questions');
                    const questions = await res.json();
                    const select = document.getElementById('securityQuestionId');
                    questions.forEach(q => {
                        const opt = document.createElement('option');
                        opt.value = q.id; opt.textContent = q.text;
                        select.appendChild(opt);
                    });
                } catch(e) {}
            });
            async function handleRegister(event) {
                event.preventDefault();
                const btn = document.getElementById('registerBtn');
                const errorEl = document.getElementById('registerError');
                setButtonLoading(btn, true); errorEl.style.display = 'none';
                const body = {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    displayName: document.getElementById('displayName').value || null,
                    dateOfBirth: document.getElementById('dateOfBirth').value,
                    securityQuestionId: parseInt(document.getElementById('securityQuestionId').value),
                    securityAnswer: document.getElementById('securityAnswer').value,
                    acceptTos: true
                };
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message || '注册失败');
                    setTokens(data.data.accessToken, data.data.refreshToken);
                    window.location.href = '/customer/dashboard';
                } catch(e) {
                    errorEl.textContent = e.message; errorEl.style.display = 'block';
                } finally { setButtonLoading(btn, false); }
            }
        </script>
        <style>.sidebar,.top-header{display:none;}.main-content{padding:0;flex:1;}.app-layout{display:block;}body{background:transparent;}</style>
    </th:block>
</body>
</html>
