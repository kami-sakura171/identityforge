<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="bell">
        <button id="notificationBell" class="notification-bell">
            🔔
            <span id="notificationBadge" class="badge" style="display:none;">0</span>
        </button>
    </div>

    <div th:fragment="tray" id="notificationTray" class="notification-tray">
        <div class="notification-tray-header">
            <h3>消息通知</h3>
            <div>
                <button class="btn btn-sm btn-secondary" onclick="markAllRead()">全部已读</button>
                <button id="closeTrayBtn" class="btn btn-sm btn-secondary" style="margin-left:4px;">✕</button>
            </div>
        </div>
        <div id="notificationTrayBody" class="notification-tray-body">
            <div style="padding:24px;text-align:center;color:#5f6368">加载中...</div>
        </div>
    </div>
</body>
</html>
